<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA HUB - Innovar UNTREF</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    
    <style>
        /* Diseño Institucional UNTREF */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; color: #333; }
        header { background-color: #003366; color: white; padding: 2rem; text-align: center; border-bottom: 5px solid #0099CC; }
        header h1 { margin: 0; font-size: 2.5rem; }
        header p { font-size: 1.2rem; margin-top: 10px; color: #e0e0e0; }
        
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .section-title { color: #003366; border-bottom: 2px solid #0099CC; padding-bottom: 10px; margin-bottom: 30px; }
        
        /* Grilla de Tarjetas */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); }
        .card-img { width: 100%; height: 180px; object-fit: cover; background-color: #e9ecef; border-bottom: 3px solid #0099CC; }
        .card-content { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .card-title { color: #003366; margin: 0 0 10px 0; font-size: 1.4rem; }
        .card-meta { font-size: 0.85rem; color: #666; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
        .card-desc { font-size: 0.95rem; color: #444; margin-bottom: 20px; line-height: 1.5; font-style: italic; }
        
        /* Botones */
        .btn-leer { display: inline-block; background-color: #0099CC; color: white; padding: 10px 18px; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: auto; align-self: flex-start; transition: background 0.3s; cursor: pointer; border: none; }
        .btn-leer:hover { background-color: #0077a3; }
        .btn-admin { display: block; width: max-content; margin: 40px auto; background-color: #333; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .btn-admin:hover { background-color: #000; }
        
        #loading { text-align: center; font-size: 1.2rem; color: #666; padding: 40px; }
    </style>
</head>
<body>
    <header>
        <h1>Innovar UNTREF | IA HUB</h1>
        <p>Laboratorio de Inteligencia Artificial y Educación 4.0</p>
    </header>
    
    <div class="container">
        <h2 class="section-title">Proyectos Activos</h2>
        
        <div id="loading">Sincronizando base de datos de proyectos...</div>
        
        <div class="grid" id="proyectos-grid"></div>
    </div>

    <a href="/admin" class="btn-admin">Acceder al Panel de Edición (CMS)</a>

    <script>
        // 1. Configuración del origen de datos
        const user = 'innovar-untref';
        const repo = 'ia-hub';
        const folder = 'content/proyectos';
        
        // 2. Motor de extracción y renderizado
        async function cargarProyectos() {
            const grid = document.getElementById('proyectos-grid');
            const loading = document.getElementById('loading');
            
            try {
                // Consultar la API de GitHub para listar los archivos de la carpeta
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${folder}`);
                if (!response.ok) throw new Error('No se pudo acceder al repositorio.');
                
                const archivos = await response.json();
                grid.innerHTML = ''; // Limpiar el estado de carga
                
                // Recorrer cada archivo encontrado
                for (const archivo of archivos) {
                    if (archivo.name.endsWith('.md')) {
                        // Descargar el contenido crudo del archivo Markdown
                        const mdResponse = await fetch(archivo.download_url);
                        const mdContent = await mdResponse.text();
                        
                        // Expresión regular para separar los Metadatos (YAML) del Cuerpo del texto
                        const yamlMatch = mdContent.match(/^---\n([\s\S]*?)\n---/);
                        if (yamlMatch) {
                            // Convertir el texto YAML en un objeto de JavaScript
                            const datosProyecto = jsyaml.load(yamlMatch[1]);
                            renderizarTarjeta(datosProyecto, grid);
                        }
                    }
                }
                
                if(grid.innerHTML === '') {
                    loading.innerHTML = 'Aún no hay proyectos publicados.';
                    loading.style.display = 'block';
                } else {
                    loading.style.display = 'none';
                }
                
            } catch (error) {
                loading.innerHTML = `Error de sincronización: ${error.message}`;
            }
        }

        // 3. Función constructora de la interfaz visual
        function renderizarTarjeta(datos, contenedor) {
            // Dar formato a la fecha (DD/MM/AAAA)
            const fechaFormateada = new Date(datos.date).toLocaleDateString('es-AR', {
                year: 'numeric', month: 'long', day: 'numeric'
            });
            
            // Si el CMS no mandó imagen, se usa el logo de la UNTREF por defecto
            const imagenUrl = datos.thumbnail ? datos.thumbnail : 'https://untref.edu.ar/sitio/img/logo_untref.png';
            
            // Limitar la metacognición a 150 caracteres para la vista previa
            let resumen = datos.metacognicion ? datos.metacognicion : 'Sin reflexión metacognitiva asignada.';
            if (resumen.length > 150) resumen = resumen.substring(0, 150) + '...';

            // Crear la estructura HTML de la tarjeta
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${imagenUrl}" alt="Portada de ${datos.title}" class="card-img" onerror="this.src='https://untref.edu.ar/sitio/img/logo_untref.png'">
                <div class="card-content">
                    <h3 class="card-title">${datos.title}</h3>
                    <div class="card-meta">
                        <strong>${datos.author}</strong><br>${fechaFormateada}
                    </div>
                    <div class="card-desc">
                        "${resumen}"
                    </div>
                    <button class="btn-leer" onclick="alert('En una próxima fase, este botón abrirá la página dinámica con el artículo completo renderizado en HTML.')">Ver Proyecto</button>
                </div>
            `;
            
            contenedor.appendChild(card);
        }

        // Iniciar la secuencia al cargar la página
        cargarProyectos();
    </script>
</body>
</html>
