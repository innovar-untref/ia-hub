# 1. Configuración del Repositorio
backend:
  name: github
  repo: innovar-untref/ia-hub
  branch: main
  base_url: https://puente-ia-hub.vercel.app
  # IMPORTANTE: Descomentá la línea de abajo y poné la URL de tu microservicio 
  # cuando hagas el Paso 4 (el puente OAuth en Vercel). Si no lo hacés, no vas a poder loguearte en producción.
  # base_url: https://auth-ia-hub.vercel.app 

# Permite probar el CMS en tu máquina (localhost) sin depender de GitHub usando 'npx decap-server'
local_backend: true

# 2. Identidad Institucional
logo_url: https://untref.edu.ar/sitio/img/logo_untref.png
site_url: https://untref.edu.ar
display_url: https://untref.edu.ar

# 3. Gestión de Archivos Multimedia (Imágenes)
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# 4. Colecciones de Contenido (Tus archivos planos)
collections:
  # Colección 1: Carrusel Interactivo de Novedades (Archivo Único JSON)
  - name: "configuraciones"
    label: "Configuraciones Globales"
    delete: false
    editor:
      preview: false
    files:
      - name: "banner"
        label: "Carrusel Interactivo Principal"
        file: "content/banner.json"
        fields:
          - {label: "Activar Carrusel en Home", widget: "boolean", name: "active", default: true}
          - label: "Elementos del Carrusel"
            name: "slides"
            widget: "list"
            summary: "{{fields.title}} ({{fields.type}})"
            fields:
              - label: "Tipo de Elemento"
                name: "type"
                widget: "select"
                options: ["imagen", "youtube"]
                default: "imagen"
              - {label: "Título / Copete Informativo", name: "title", widget: "string"}
              - {label: "Imagen de Fondo (Ruta o URL)", name: "image", widget: "string", required: false, hint: "Pega una URL externa completa o la ruta local de tu archivo multimedia"}
              - {label: "ID de Video de YouTube", name: "youtube_id", widget: "string", required: false, hint: "Ej del ID: dQw4w9WgXcQ (Código que figura tras el v= en la URL)"}
              - {label: "Enlace del Botón (URL)", name: "link", widget: "string", required: false}
              - {label: "Texto del Enlace", name: "link_text", widget: "string", default: "Ver más", required: false}

  # Colección 2: Proyectos en formato Markdown (.md)
  - name: "proyectos"
    label: "Proyectos IA HUB"
    folder: "content/proyectos"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    fields:
      - {label: "Título del Proyecto", name: "title", widget: "string"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Autor/Equipo", name: "author", widget: "string", default: "Equipo de Tecnología Educativa"}
      - {label: "Imagen Principal", name: "thumbnail", widget: "image", required: false}
      - {label: "Reflexión Metacognitiva", name: "metacognicion", widget: "text", hint: "Describa brevemente el enfoque pedagógico y el desarrollo del pensamiento crítico de este proyecto."}
      - {label: "Cuerpo del Artículo", name: "body", widget: "markdown"}

  # Colección 3: Relatorías en formato JSON (.json)
  - name: "relatorias"
    label: "Relatorías y Entregas"
    folder: "content/relatorias"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - {label: "Título de la Relatoría", name: "title", widget: "string"}
      - {label: "Fecha de Entrega", name: "date", widget: "datetime"}
      - {label: "Estado de Revisión", name: "status", widget: "select", options: ["Borrador", "Para Corrección", "Aprobado"]}
      - {label: "Síntesis", name: "description", widget: "text"}
      - {label: "Contenido Principal", name: "body", widget: "markdown"}
